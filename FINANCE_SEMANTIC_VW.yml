name: FINANCE_SEMANTIC_VWtables:name: ORDERSdescription: The table contains records of customer orders. Each record represents a single order and includes details about the customer, geographic region, product category, order timing, and financial and fulfillment information.base_table:database: SALES_DBschema: ANALYTICStable: ORDERSdimensions:name: CUSTOMER_NAMEdescription: The name of the customer associated with an order.expr: CUSTOMER_NAMEdata_type: VARCHAR(16777216)sample_values:Beta LtdCyan IncAcme Corpname: ORDER_IDdescription: Unique identifier for each order.expr: ORDER_IDdata_type: NUMBER(38,0)sample_values:'1002''1020''1001'name: PRODUCT_CATEGORYdescription: The category of the product associated with an order.expr: PRODUCT_CATEGORYdata_type: VARCHAR(16777216)sample_values:FurnitureElectronicsApparelname: QUANTITYdescription: The number of units ordered.expr: QUANTITYdata_type: NUMBER(38,0)sample_values:'4''7''25'name: REGIONdescription: The geographic region associated with an order.expr: REGIONdata_type: VARCHAR(16777216)sample_values:SouthNorthEastname: STATUSdescription: The current fulfillment status of an order.expr: STATUSdata_type: VARCHAR(16777216)sample_values:ShippedPendingCancelledtime_dimensions:name: ORDER_DATEdescription: The date on which an order was placed.expr: ORDER_DATEdata_type: DATEsample_values:'2025-01-05''2025-01-11''2025-01-19'facts:name: AMOUNTdescription: The monetary amount associated with an order.expr: AMOUNTdata_type: NUMBER(10,2)access_modifier: public_accesssample_values:'1350.00''450.00''1800.00'verified_queries:name: '"What is the total sales amount by region"'sql: |-SELECT REGION,SUM(AMOUNT) AS TOTAL_AMOUNTFROM SALES_DB.ANALYTICS.ORDERSGROUP BY REGIONORDER BY TOTAL_AMOUNT DESC;question: What is the total sales amount by regionverified_at: 1784644516verified_by: Priyanka Pandeyuse_as_onboarding_question: truename: '"Which product category generated the most revenue"'sql: |-SELECT PRODUCT_CATEGORY,SUM(AMOUNT) AS TOTAL_REVENUEFROM SALES_DB.ANALYTICS.ORDERSGROUP BY PRODUCT_CATEGORYORDER BY TOTAL_REVENUE DESCLIMIT 1;question: Which product category generated the most revenueverified_at: 1784644538verified_by: Priyanka Pandeyuse_as_onboarding_question: true