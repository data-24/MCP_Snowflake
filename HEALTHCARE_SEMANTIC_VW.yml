          - end_claim_date
          - last_claim_date
          - latest_claim_date
          - recent_claim_date
        expr: MAX(claim_date)
        access_modifier: public_access
      - name: NUM_CLAIMS
        description: Calculates the total count of insurance claim records. Use when questions ask about 'number of claims', 'claim volume', 'how many claims were filed', or 'claim counts by quarter, insurer, or time period'. Helps analyze insurance claim activity, track claim volumes over time, and compare claim frequencies across departments, insurers, or admission types.
        expr: COUNT(claim_id)
        access_modifier: public_access
      - name: TOTAL_APPROVED_AMOUNT
        description: Calculates the total monetary amount approved across insurance claims. Use when questions ask about 'total approved amount', 'how much was approved by insurance', 'approved claim value', or 'insurance payout totals'. Helps evaluate the financial impact of insurance approvals, compare approved amounts against claimed amounts, and analyze reimbursement trends across insurers, departments, or time periods.
        expr: SUM(approved_amount)
        access_modifier: public_access
      - name: TOTAL_CLAIM_AMOUNT
        synonyms:
          - final_claim_amount
        description: Calculates the total monetary amount claimed across all insurance claim records. Use when questions ask about 'total claim amount', 'how much was claimed', 'sum of claims', or 'claim value by quarter or period'. Helps evaluate the overall financial exposure of insurance claims, compare claimed amounts against approved amounts, and analyze claim value trends across time periods, insurers, or departments.
