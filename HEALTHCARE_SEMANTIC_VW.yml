    use_as_onboarding_question: false
  - name: '"What were the claims made in every quarter for the first three calendar years available in the data? Group claims by year and quarter, showing the count of claims and total claim amount for each quarter."'
    sql: |-
      WITH quarterly_claims AS (
        SELECT
          DATE_TRUNC('QUARTER', claim_date) AS quarter_start,
          DATE_PART('year', claim_date) AS claim_year,
          DATE_PART('quarter', claim_date) AS claim_quarter,
          COUNT(claim_id) AS num_claims,
          SUM(claim_amount) AS total_claim_amount,
          SUM(approved_amount) AS total_approved_amount
        FROM
          insurance_claims
        GROUP BY
          DATE_TRUNC('QUARTER', claim_date),
          DATE_PART('year', claim_date),
          DATE_PART('quarter', claim_date)
      ),
      min_years AS (
        SELECT
          DISTINCT claim_year
        FROM
          quarterly_claims
        ORDER BY
          claim_year ASC
        LIMIT
          3
      )
      SELECT
        qc.quarter_start,
        qc.claim_year,
        qc.claim_quarter,
        qc.num_claims,
        qc.total_claim_amount,
        qc.total_approved_amount
      FROM
        quarterly_claims AS qc
        INNER JOIN min_years AS my ON qc.claim_year = my.claim_year
      ORDER BY
        qc.quarter_start ASC
        /* Generated by Cortex Analyst (request_id: ff5f600f-3170-4028-8e7b-3e7c59420c9f) */
    question: What were the claims made in every quarter for the first three calendar years available in the data? Group claims by year and quarter, showing the count of claims and total claim amount for each quarter.
    verified_at: 1783188203
    verified_by: Priyanka Pandey
    use_as_onboarding_question: false
