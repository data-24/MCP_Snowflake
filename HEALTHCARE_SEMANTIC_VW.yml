    metrics:
      - name: DISTINCT_ADMISSION_ID
        description: Calculates the count of unique patient admissions associated with insurance claims. Use when questions ask about 'how many unique admissions have claims', 'distinct admissions with insurance', or 'number of admissions covered by insurance'. Helps assess the breadth of insurance claim coverage across patient admissions and avoid double-counting admissions with multiple claim records.
        expr: COUNT(DISTINCT admission_id)
        access_modifier: public_access
      - name: EARLIEST_CLAIM_DATE
        synonyms:
          - first_claim_date
          - min_claim_date
