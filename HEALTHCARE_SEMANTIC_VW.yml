verified_queries:
  - name: '"What is the total claim amount and approved amount by claim status year to date?"'
    sql: |-
      SELECT
        *
      FROM
        SEMANTIC_VIEW(
          HEALTHCARE_DB.GOLD.HEALTHCARE_SEMANTIC_VW METRICS SUM(claim_amount) AS total_claim_amount,
          SUM(approved_amount) AS total_approved_amount DIMENSIONS claim_status
          WHERE
            claim_date >= DATE_TRUNC('YEAR', CURRENT_DATE)
            AND claim_date <= CURRENT_DATE
        )
        /* Generated by Cortex Analyst (request_id: ac8af9b6-3760-452c-8a5e-3ae48cefe203) */
    question: What is the total claim amount and approved amount by claim status year to date?
    verified_at: 1783187428
    verified_by: Priyanka Pandey
    use_as_onboarding_question: false
  - name: '"How many patient admissions were there by department and admission type in the last month?"'
    sql: |-
      SELECT
        pa.department,
        pa.admission_type,
        COUNT(pa.admission_id) AS num_admissions
      FROM
        patient_admissions AS pa
      WHERE
        pa.admit_date >= DATE_TRUNC('MONTH', CURRENT_DATE - INTERVAL '1 MONTH')
        AND pa.admit_date < DATE_TRUNC('MONTH', CURRENT_DATE)
      GROUP BY
        pa.department,
        pa.admission_type
      ORDER BY
        num_admissions DESC NULLS LAST
        /* Generated by Cortex Analyst (request_id: 058b18dc-b012-4e46-9838-74bff076211a) */
    question: How many patient admissions were there by department and admission type in the last month?
    verified_at: 1783186777
    verified_by: Priyanka Pandey
    use_as_onboarding_question: false
  - name: '"What is the total treatment cost for each outcome type across all treatment records?"'
    sql: |-
      SELECT
        tr.outcome,
        MIN(tr.treatment_date) AS start_date,
        MAX(tr.treatment_date) AS end_date,
        SUM(tr.cost) AS total_treatment_cost
      FROM
        treatment_records AS tr
      GROUP BY
        tr.outcome
      ORDER BY
        total_treatment_cost DESC NULLS LAST
        /* Generated by Cortex Analyst (request_id: aeb3eff4-ffac-40c1-a79d-f41864f8c7fd) */
    question: What is the total treatment cost for each outcome type across all treatment records?
    verified_at: 1783186864
