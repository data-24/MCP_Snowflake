        /* Generated by Cortex Analyst (request_id: 058b18dc-b012-4e46-9838-74bff076211a) */
    question: 'How many patient admissions were there by department and admission type in the previous calendar month? (Note: ''last month'' is interpreted as the previous calendar month. If you meant the past 30 days, please ask for ''past 30 days'' instead.)'
    verified_at: 1783188163
