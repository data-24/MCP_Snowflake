          DATE_PART('quarter', claim_date)
      ),
      min_years AS (
        SELECT
          DISTINCT claim_year
        FROM
          quarterly_claims
        ORDER BY
          claim_year ASC
        LIMIT
          3
      )
      SELECT
        qc.quarter_start,
        qc.claim_year,
        qc.claim_quarter,
        qc.num_claims,
